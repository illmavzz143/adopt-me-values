name: Auto Update AMVGG Values

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper and Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c '
          import requests
          import json

          url = "https://amvgg.com/value-updates"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "RSC": "1",
              "Accept": "text/x-component",
              "Referer": "https://amvgg.com/value-updates"
          }

          try:
              response = requests.get(url, headers=headers, timeout=20)
              print(f"Status: {response.status_code}")
              
              if response.status_code == 200:
                  # Zapisujemy pobrany strumień Next.js do pliku
                  with open("values.json", "w", encoding="utf-8") as f:
                      f.write(response.text)
                  print("Sukces! Pobrano dane Next.js.")
              else:
                  print("Błąd HTTP:", response.status_code)
                  exit(1)
          except Exception as e:
              print("Błąd:", str(e))
              exit(1)
          '
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.github.io"
          git add values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aktualizacja danych RSC" && git push origin main)
