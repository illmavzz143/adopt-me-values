name: Auto Update AMVGG Values

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper Script
        run: |
          python -c '
          import requests
          import json
          
          url = "https://amvgg.com/api/values"
          headers = {"User-Agent": "Mozilla/5.0"}
          
          try:
              response = requests.get(url, headers=headers, timeout=15)
              if response.status_code == 200:
                  data = response.json()
                  with open("values.json", "w", encoding="utf-8") as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  print("Sukces: Pobrano pełną bazę wszystkich petów!")
              else:
                  print("Blad pobierania:", response.status_code)
          except Exception as e:
              print("Wyjatek:", str(e))
          '

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.github.io"
          git add values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatyczna aktualizacja pełnej bazy petów" && git push)
