name: Auto Update AMVGG Values

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests lxml beautifulsoup4

      - name: Run Scraper and Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c '
          import requests
          import json

          # Próbujemy pobrać dane z nagłówkami udającymi prawdziwą przeglądarkę
          url = "https://amvgg.com/api/values"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "application/json, text/plain, */*",
              "Referer": "https://amvgg.com/"
          }

          try:
              response = requests.get(url, headers=headers, timeout=20)
              print(f"Kod odpowiedzi: {response.status_code}")
              
              if response.status_code == 200:
                  data = response.json()
                  with open("values.json", "w", encoding="utf-8") as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  print("Sukces! Zapisano plik values.json.")
              else:
                  print("Serwer zwrócił błąd:", response.text[:200])
                  exit(1)
          except Exception as e:
              print("Błąd krytyczny:", str(e))
              exit(1)
          '
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.github.io"
          git add values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aktualizator danych AMVGG" && git push origin main)
