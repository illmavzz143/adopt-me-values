name: Auto Update AMVGG Values

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper and Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c '
          import requests
          import json
          import os
          import subprocess

          url = "https://amvgg.com/api/values"
          headers = {"User-Agent": "Mozilla/5.0"}

          try:
              response = requests.get(url, headers=headers, timeout=15)
              if response.status_code == 200:
                  data = response.json()
                  with open("values.json", "w", encoding="utf-8") as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  print("Pobrano dane pomyślnie.")
              else:
                  print("Blad HTTP:", response.status_code)
                  exit(1)
          except Exception as e:
              print("Blad:", str(e))
              exit(1)
          '
          
          # Konfiguracja gita z użyciem tokena uwierzytelniającego
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.github.io"
          git add values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatyczna aktualizacja values.json" && git push origin main)
