name: Auto Update AMVGG Values

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper and Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c '
          import requests
          import json
          import re

          # Próbujemy uderzyć bezpośrednio w potencjalny endpoint API lub główne źródło
          url = "https://amvgg.com/api/values" # Czasami endpointy tak się nazywają lub ukrywają w strukturze
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "application/json"
          }

          data_to_save = {}

          try:
              response = requests.get("https://amvgg.com/value-updates", headers={
                  "User-Agent": "Mozilla/5.0",
                  "RSC": "1"
              }, timeout=20)
              
              if response.status_code == 200:
                  text = response.text
                  # Szukamy w tekście struktur, które przypominają ceny lub nazwy petów (wzorców liczbowych/tekstowych)
                  # Wyciągamy wszystko, co wygląda na słownik JSON ukryty w strumieniu Next.js
                  matches = re.findall(r"\{[^}]+\}", text)
                  
                  extracted = {}
                  for m in matches:
                      try:
                          parsed = json.loads(m)
                          if isinstance(parsed, dict):
                              extracted.update(parsed)
                      except:
                          pass
                  
                  if extracted:
                      data_to_save = extracted
                  else:
                      # Awaryjnie zapisujemy czysty znacznik, jeśli struktura jest mocno zagnieżdżona
                      data_to_save = {"error": "API structure requires direct endpoint"}

              with open("values.json", "w", encoding="utf-8") as f:
                  json.dump(data_to_save, f, indent=4)
              print("Zakończono próbę parsowania API.")
          except Exception as e:
              print("Blad:", str(e))
              exit(1)
          '
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.github.io"
          git add values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatyczna aktualizacja API values.json" && git push origin main)
