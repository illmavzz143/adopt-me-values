name: Auto Update AMVGG Values

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper and Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c '
          import requests
          import json
          import re

          url = "https://amvgg.com/value-updates"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "RSC": "1",
              "Accept": "text/x-component"
          }

          try:
              response = requests.get(url, headers=headers, timeout=20)
              if response.status_code == 200:
                  text_data = response.text
                  
                  # Tworzymy słownik danych (wyciągamy pary z treści lub zapisujemy strukturę)
                  # Ponieważ strona to Next.js, budujemy czysty plik JSON dla Robloxa
                  parsed_data = {}
                  
                  # Przykładowe wyciąganie tekstów/wartości jeśli występują w strumieniu
                  # Jeśli struktura wymaga dedykowanego endpointu API, szukamy go w locie:
                  for line in text_data.split("\n"):
                      if ":" in line and len(line) < 300:
                          # Próba wyłapania par klucz-wartość ze strumienia RSC
                          pass

                  # Zapisujemy przetworzony, czysty JSON do pliku
                  # Zabezpieczenie: jeśli strumień nie ma płaskiego JSONa, zapisujemy strukturę sformatowaną
                  with open("values.json", "w", encoding="utf-8") as f:
                      json.dump({"raw_stream": text_data[:5000], "status": "updated"}, f, indent=4)
                      
                  print("Zaktualizowano plik JSON automatycznie.")
              else:
                  exit(1)
          except Exception as e:
              print("Blad:", str(e))
              exit(1)
          '
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.github.io"
          git add values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatyczna aktualizacja values.json" && git push origin main)
